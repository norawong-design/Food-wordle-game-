<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワードル (日本語 食べ物編) – B2レベル</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f0f14;
            font-family: 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-wrapper {
            max-width: 650px;
            width: 100%;
            background: #1b1b22;
            border-radius: 48px;
            padding: 28px 24px 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #3b3b4b;
            color: #ececf0;
        }

        /* タイトル */
        .title-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .main-title {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(145deg, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 10px #ff8c4240;
        }

        .subtitle {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 6px;
            border-bottom: 1px dashed #4a4a5a;
            padding-bottom: 12px;
        }

        /* ターゲットヒント & 残り */
        .target-row {
            display: flex;
            justify-content: space-between;
            background: #25252e;
            border-radius: 50px;
            padding: 12px 22px;
            margin-bottom: 30px;
            border: 1px solid #49495b;
            font-size: 1rem;
            align-items: center;
        }

        .target-hint {
            color: #bcbcda;
        }

        .target-word-hidden {
            font-weight: 600;
            color: #ffc285;
            letter-spacing: 1px;
        }

        /* 入力フォーム */
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #guessInput {
            flex: 3;
            min-width: 200px;
            background: #2a2a35;
            border: 2px solid #56567a;
            border-radius: 60px;
            padding: 0 25px;
            font-size: 1.5rem;
            font-family: inherit;
            color: white;
            caret-color: #ffae6a;
            height: 70px;
            text-transform: uppercase; /* カタカナ大文字でも小文字でも大丈夫、変換はJSで扱う */
        }

        #guessInput:focus {
            outline: none;
            border-color: #b98cff;
            box-shadow: 0 0 12px #8a6de0;
        }

        #submitGuess {
            flex: 1;
            background: #3f3f55;
            border: none;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            border-bottom: 5px solid #21212b;
            transition: 0.1s;
            padding: 0 10px;
            min-width: 120px;
            height: 70px;
        }

        #submitGuess:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        /* グリッド (試行) */
        .guesses-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0 20px;
        }

        .guess-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .tile {
            width: 62px;
            height: 62px;
            background: #282833;
            border: 2px solid #4e4e63;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #f5f5ff;
            text-transform: uppercase;
            transition: 0.15s;
            box-shadow: 0 5px 0 #12121b;
        }

        /* 色の定義 */
        .tile.green {
            background: #2e7d5e;
            border-color: #6fcb9f;
            box-shadow: 0 5px 0 #1b4a36;
        }

        .tile.yellow {
            background: #b58a3b;
            border-color: #f0c674;
            box-shadow: 0 5px 0 #725520;
        }

        .tile.gray {
            background: #4a4a5a;
            border-color: #6a6a80;
            box-shadow: 0 5px 0 #2d2d36;
        }

        /* 次の単語ボタン */
        .next-btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }

        #nextWordBtn {
            background: #32323f;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: 600;
            padding: 1.2rem 3.2rem;
            border-radius: 60px;
            border-bottom: 6px solid #1a1a24;
            cursor: pointer;
            letter-spacing: 3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        #nextWordBtn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }

        #nextWordBtn:hover {
            background: #404054;
        }

        /* ステータス表示 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #20202a;
            padding: 12px 25px;
            border-radius: 60px;
            border: 1px solid #4a4a60;
            color: #bcbce6;
            margin-top: 20px;
            font-size: 1rem;
        }

        .remaining {
            background: #2d2d3a;
            padding: 2px 22px;
            border-radius: 60px;
            border: 1px solid #6a6a8a;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="worddleApp">
    <!-- タイトル (日本語指示) -->
    <div class="title-section">
        <h1 class="main-title"> 🍣 ワードル 🍜 </h1>
        <div class="subtitle">
            ⬛ 食べ物カタカナ語 5文字 ⬛<br>
            緑🟩＝正しい位置　黄🟨＝別の位置　灰⬜＝その文字は含まれない
        </div>
    </div>

    <!-- 現在のターゲットヒント（文字数だけ表示） -->
    <div class="target-row">
        <span class="target-hint">🔍 お題: 5文字の料理 </span>
        <span class="target-word-hidden" id="targetPlaceholder"> _ _ _ _ _ </span>
    </div>

    <!-- 入力 & 送信 -->
    <div class="input-area">
        <input type="text" id="guessInput" placeholder="カタカナ5文字" maxlength="5" autocomplete="off" autofocus>
        <button id="submitGuess">⏎ 回答</button>
    </div>

    <!-- 推測グリッド (最大6行) -->
    <div class="guesses-grid" id="guessesGrid">
        <!-- JSで動的に生成されるが、初期は6行の空 -->
    </div>

    <!-- 次の単語ボタン -->
    <div class="next-btn-wrapper">
        <button id="nextWordBtn">▶ 次の単語</button>
    </div>

    <!-- 残り単語数表示 -->
    <div class="status-bar">
        <span>📋 残り単語: <span id="remainingCount">--</span> / <span id="totalCount">--</span></span>
        <span class="remaining" id="currentState">🔄 推測してください</span>
    </div>
</div>

<script>
    (function(){
        // ---------- B2レベル　カタカナ料理単語 (全て5文字) ----------
        const foodWords = [
            "スシ",        // 3文字 → 除外 (ルール:5文字のみ)
            // ちゃんと5文字のカタカナ料理を厳選:
            "サシミ",      // 5文字 (サ・シ・ミ)
            "テンプラ",    // 4文字？ テ・ン・プ・ラ (4) ダメ
            // 正しく5文字のもの:
            "ギョウザ",    // 5文字 (ギョ・ウ・ザ) → 長音符? ギョウザは4モーラ? ここではカタカナ1文字1カウント: ギ,ヨ,ウ,ザ → 4, 除外
            "ラーメン",    // 5文字 (ラー・メ・ン) 実際 ラ・ー・メ・ン = 4だが長音含め ラ,ー,メ,ンで4。Wordle方式だと長音は1文字扱い。統一するため全て長音排除は面倒。実際5文字のカタカナ料理例:
            // 5文字カタカナ: オムライス(7), カレー(4) ...
            // 確実な5文字 (清音5文字)を使う:
            "サケ",       // 3文字 ダメ
            "マグロ",      // 3文字
            "タコヤキ",    // 5文字? タ・コ・ヤ・キ =4 やはり…
            // 仕方なく、しっかり5文字の外来語/料理
            // 「オムレツ」5文字, 「オニギリ」5文字(オ・ニ・ギ・リ)=4, オニギリは4。
            // 正確を期すために、５文字のカタカナ食品リスト: 「オムレツ」5, 「オムライス」は7。
            // 以下に5文字（拗音・長音を1文字と数える標準的Wordle方式。しかし日本語Wordleは大抵、小さな「ャ」「ュ」「ョ」は1文字、長音「ー」も1文字と扱う)
            // ここではプレイヤーに分かりやすく「長音含め1文字」カウント。次の単語を使う:
        ];

        // 再定義：長音・促音などを1文字として、ちゃんと5文字になる食べ物 (B2レベル)
        const validFood = [
            "チャーハン",   // 5文字 (チ,ャ,ー,ハ,ン) ※小文字ャは1字, 長音1字 →5
            "ギョウザ",     // ギ,ョ,ウ,ザ → 4？ ギョウザは一般に4文字 (gyouza) → ギョ,ウ,ザ = 3? 複雑なので避ける
            "オムレツ",     // オ,ム,レ,ツ → 4 (ダメ)
            "サラダ",       // 4 (ダメ)
            "カレー",       // 3 (カ,レ,ー) = 3
            "ラーメン",     // ラ,ー,メ,ン = 4
            "ヤキトリ",     // ヤ,キ,ト,リ = 4
            "タコヤキ",     // タ,コ,ヤ,キ = 4
            "オニギリ",     // オ,ニ,ギ,リ = 4
            // 確実な5文字の料理:  "ハンバーグ" は5? ハ,ン,バ,ー,グ=5 ◯
            // "ハンバーガー"は6
            // "ソーセージ" 5? ソ,ー,セ,ー,ジ =5 ◯
            // "ミートソース" 6
            // "スパゲッティ" 長い
        ];

        // 確実な5文字 (カタカナ、長音可) のリスト:
        const foodFive = [
            "ハンバーグ",   // 5
            "ソーセージ",   // 5
            "ピラフ",       // 4  (ピ,ラ,フ) = 3 ダメ
            "ドリア",       // 4? ド,リ,ア =3 ダメ
            "シチュー",     // シ,チ,ュ,ー =4
            "グラタン",     // グ,ラ,タ,ン=4
            "オムレツ",     // 4
            "サンマ",       // 3
            "タイ",         // 2
            "フライ",       // 3
            "エビフライ",   // 5? エ,ビ,フ,ラ,イ =5 ◯ だが「エビフライ」5文字だ！
            "エビフライ",   // 使える
            "カツ",         // 3
            "コロッケ",     // 4? コ,ロ,ッ,ケ =4
            "メンチカツ",   // 5? メ,ン,チ,カ,ツ =5 ◯
            "タルタル",     // 4? タ,ル,タ,ル =4
            "タコス",       // 3? タ,コ,ス =3
            "ナン",         // 2
            "チャーシュー", // 6
            "メンマ",       // 3
            "餃子"          // カタカナではない
        ];

        // もう一度整理: 確実なカタカナ5文字 (長音、小文字を1文字としてカウント):
        const finalFoodList = [
            "ハンバーグ",   // 5
            "ソーセージ",   // 5
            "エビフライ",   // 5
            "メンチカツ",   // 5
            "カツサンド",   // 6
            "ホットドッグ", // 多すぎ
            "オムハヤシ",   // 5? オ,ム,ハ,ヤ,シ=5 ◯
            "ハヤシライス", // 6
            "ビビンバ",     // 4? ビ,ビ,ン,バ=4
            "チャーハン",   // 5 ◯ (チ,ャ,ー,ハ,ン)
            "ヤキニク",     // 4 (ヤ,キ,ニ,ク) =4
            "ジンギスカン", // 長い
            "ブタマン",     // 4
            "シュウマイ",   // シ,ュ,ウ,マ,イ =5 ◯
            "ギョウザ",     // ギョ,ウ,ザ = 3… 不安なので外す
            "エビチリ",     // エ,ビ,チ,リ =4
        ];

        // 厳選５文字（長音・小文字含め5）で確実:
        const words = [
            "ハンバーグ", 
            "ソーセージ", 
            "エビフライ", 
            "メンチカツ", 
            "オムハヤシ",
            "チャーハン",
            "シュウマイ",
            "ホットケーキ", // 6
            "カツカレー",   // 5? カ,ツ,カ,レ,ー =5 ◯
            "カツカレー",
            "オムレツ",     // 4 (除外)
        ];

        // 最終決定 (ユニーク、かつ確実な5文字) 
        const uniqueWords = ["ハンバーグ","ソーセージ","エビフライ","メンチカツ","チャーハン","シュウマイ","カツカレー","オムハヤシ"];
        // さらに"サンマ"とか除外、"オムレツ"は4だが「オムレツ」は4文字扱い？ プレイヤー混乱を避けるため上記でいく。
        // 実際のWordle日本語版は「ッ」「ャ」「ー」も1マス。なので「オムレツ」は4マスなので使わない。

        // ここでは上のuniqueWordsを使う (全て正しく5文字)
        const foodCatalog = [...uniqueWords];

        // ---------- ゲーム状態 ----------
        let remainingWords = [];               // 残りの単語リスト (オブジェクトではなく文字列)
        let currentWord = '';                  // 現在のお題 (5文字)
        let guesses = [];                       // これまでの推測行 (最大6)
        const maxGuesses = 6;

        // DOM
        const guessesGrid = document.getElementById('guessesGrid');
        const targetPlaceholder = document.getElementById('targetPlaceholder');
        const guessInput = document.getElementById('guessInput');
        const submitBtn = document.getElementById('submitGuess');
        const nextBtn = document.getElementById('nextWordBtn');
        const remainingSpan = document.getElementById('remainingCount');
        const totalSpan = document.getElementById('totalCount');
        const currentStateSpan = document.getElementById('currentState');

        // 初期化
        function initGame() {
            // カタログをシャッフルしてremainingWordsにコピー
            remainingWords = shuffleArray([...foodCatalog]);
            updateRemainingDisplay();
            loadNextWord();
            renderGrid();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 残数表示更新
        function updateRemainingDisplay() {
            remainingSpan.textContent = remainingWords.length;
            totalSpan.textContent = foodCatalog.length;
        }

        // 次の単語をロード (remainingWordsの先頭)
        function loadNextWord() {
            if (remainingWords.length === 0) {
                currentWord = '';
                targetPlaceholder.textContent = '🎉 終了';
                currentStateSpan.innerHTML = 'コンプリート！';
                return;
            }
            // 先頭を取り出して currentWord に (破壊的に)
            currentWord = remainingWords.shift(); 
            // プレースホルダーを更新 (文字数分アンダーバー)
            targetPlaceholder.textContent = ' _ '.repeat(currentWord.length).trim();
            // 推測リセット
            guesses = [];
            renderGrid();
            guessInput.value = '';
            guessInput.disabled = false;
            submitBtn.disabled = false;
            currentStateSpan.innerHTML = '🟩🟨⬜ 推測受付中';
        }

        // グリッド描画
        function renderGrid() {
            guessesGrid.innerHTML = '';
            // 最大6行作成
            for (let r = 0; r < maxGuesses; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'guess-row';
                if (r < guesses.length) {
                    // 既存の推測行
                    const guess = guesses[r];
                    for (let i = 0; i < 5; i++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.textContent = guess[i] || '';
                        // 色判定 (currentWordと比較)
                        if (currentWord && guess[i]) {
                            const targetChar = currentWord[i];
                            if (guess[i] === targetChar) {
                                tile.classList.add('green');
                            } else if (currentWord.includes(guess[i])) {
                                tile.classList.add('yellow');
                            } else {
                                tile.classList.add('gray');
                            }
                        } else {
                            tile.classList.add('gray'); // 空なら灰色ベース
                        }
                        rowDiv.appendChild(tile);
                    }
                } else {
                    // 空行
                    for (let i = 0; i < 5; i++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.textContent = '';
                        rowDiv.appendChild(tile);
                    }
                }
                guessesGrid.appendChild(rowDiv);
            }
        }

        // 推測処理
        function handleGuess() {
            if (!currentWord) {
                alert('お題がありません。「次の単語」を押してください。');
                return;
            }
            if (guesses.length >= maxGuesses) {
                alert('もう推測できません。次の単語へどうぞ。');
                return;
            }
            let guess = guessInput.value.trim().toUpperCase();
            if (guess.length !== 5) {
                alert('5文字のカタカナで入力してください (長音「ー」も1文字)。');
                return;
            }
            // 簡易カタカナチェック (カタカラなくてもOK)
            guesses.push(guess);
            renderGrid();

            // 正解か？
            if (guess === currentWord) {
                currentStateSpan.innerHTML = '🎉 正解！ おめでとう！';
                guessInput.disabled = true;
                submitBtn.disabled = true;
            } else if (guesses.length === maxGuesses) {
                currentStateSpan.innerHTML = `😢 残念… 答えは 「${currentWord}」`;
                guessInput.disabled = true;
                submitBtn.disabled = true;
            }

            guessInput.value = '';
            guessInput.focus();
            updateRemainingDisplay();
        }

        // 次の単語ボタン
        function nextWord() {
            if (remainingWords.length === 0 && !currentWord) {
                // もしすべて終了なら最初からリシャッフル
                if (confirm('全ての単語を使いました。最初からやり直しますか？')) {
                    remainingWords = shuffleArray([...foodCatalog]);
                    updateRemainingDisplay();
                    loadNextWord();
                }
                return;
            }
            // まだ残りがある: 単に次の読み込み
            if (remainingWords.length === 0 && currentWord) {
                // 現在の単語が最後で残りが0、でもcurrentWordあるケース（最後の1つを消費した後）
                // 強制的に終了扱い
                currentWord = '';
                targetPlaceholder.textContent = '🎉 終了';
                currentStateSpan.innerHTML = '全問クリア';
                guesses = [];
                renderGrid();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                updateRemainingDisplay();
                return;
            }
            loadNextWord();
        }

        // イベント登録
        submitBtn.addEventListener('click', handleGuess);
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGuess();
        });
        nextBtn.addEventListener('click', nextWord);

        // スタート
        initGame();
    })();
</script>
</body>
</html>
